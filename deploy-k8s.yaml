apiVersion: v1
kind: ServiceAccount
metadata:
  name: tasky-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tasky-admin-binding
subjects:
- kind: ServiceAccount
  name: tasky-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: tasky-secrets
type: Opaque
data:
  # base64 encoded string of: mongodb://admin:mongoadmin4321@10.10.0.9:27017
  #10.10.0.9
  MONGODB_URI: bW9uZ29kYjovL2FkbWluOm1vbmdvYWRtaW40MzIxQDEwLjEwLjAuOToyNzAxNw==
  # base64 encoded string of: super-secret-key-123
  SECRET_KEY: c3VwZXItc2VjcmV0LWtleS0xMjM=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasky-deployment
  labels:
    app: tasky
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasky
  template:
    metadata:
      labels:
        app: tasky
    spec:
      serviceAccountName: tasky-sa
      containers:
      - name: tasky
        image: tssingkofer/tasky:latest
        ports:
        - containerPort: 8080 
        env:
        - name: MONGODB_URI
          # value: mongodb://admin:mongoadmin4321@10.10.0.9:27017
          valueFrom:
            secretKeyRef:
              name: tasky-secrets
              key: MONGODB_URI
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tasky-secrets
              key: SECRET_KEY
        resources:
          requests:
            memory: "1024Mi"
            cpu: "1"
          limits:
            memory: "1024Mi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: tasky-service
  labels:
    app: tasky
spec:
  type: NodePort 
  selector:
    app: tasky
  ports:
    - protocol: TCP
      port: 80   
      targetPort: 8080 
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tasky-ingress
  annotations:
    # Specifies that GKE should use its native Application Load Balancer (ALB)
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tasky-service
            port:
              number: 80